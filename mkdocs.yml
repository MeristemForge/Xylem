site_name: Xylem SDK
site_description: Async networking SDK for C — TCP, UDP, TLS, DTLS, HTTP, WebSocket, RUDP, Serial
site_url: https://xylem.dev
repo_url: https://github.com/user/xylem
repo_name: xylem

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - 首页: index.md
  - 快速上手:
    - 构建与安装: guide/build.md
    - 5 分钟入门: guide/quickstart.md
  - API 参考:
    - 总览: api/index.md
    - 核心:
      - 事件循环: api/loop.md
      - 地址: api/addr.md
      - 平台: api/platform.md
      - 线程池: api/thrdpool.md
    - 传输层:
      - TCP: api/tcp.md
      - UDP: api/udp.md
      - UDS: api/uds.md
      - TLS: api/tls.md
      - DTLS: api/dtls.md
      - RUDP: api/rudp.md
    - 应用层:
      - HTTP 通用: api/http-common.md
      - HTTP 客户端: api/http-client.md
      - HTTP 服务端: api/http-server.md
      - WebSocket 通用: api/ws-common.md
      - WebSocket 客户端: api/ws-client.md
      - WebSocket 服务端: api/ws-server.md
    - 设备:
      - 串口: api/serial.md
    - 工具:
      - JSON: api/json.md
      - Gzip: api/gzip.md
      - Base64: api/base64.md
      - AES-256: api/aes256.md
      - SHA / HMAC: api/sha.md
      - FEC: api/fec.md
      - Varint: api/varint.md
      - 日志: api/logger.md
    - 数据结构:
      - 链表: api/list.md
      - 队列: api/queue.md
      - 栈: api/stack.md
      - 堆: api/heap.md
      - 红黑树: api/rbtree.md
      - 环形缓冲区: api/ringbuf.md
  - 设计文档:
    - TCP: design/tcp-design.md
    - UDP: design/udp-design.md
    - TLS: design/tls-design.md
    - DTLS: design/dtls-design.md
    - RUDP: design/rudp-design.md
    - UDS: design/uds-design.md
    - Serial: design/serial-design.md
