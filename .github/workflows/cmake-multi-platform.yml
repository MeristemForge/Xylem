# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  OPENSSL_VERSION: "3.5.0"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # ── Install OpenSSL (Linux) ── source build with cache ──
    - name: Cache OpenSSL (Linux)
      if: runner.os == 'Linux'
      id: cache-openssl-linux
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/openssl-install
        key: openssl-${{ env.OPENSSL_VERSION }}-linux-x64

    - name: Build OpenSSL from source (Linux)
      if: runner.os == 'Linux' && steps.cache-openssl-linux.outputs.cache-hit != 'true'
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y build-essential
        curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz" -o openssl.tar.gz
        tar xzf openssl.tar.gz
        cd "openssl-${OPENSSL_VERSION}"
        ./Configure --prefix="${{ github.workspace }}/openssl-install" --openssldir="${{ github.workspace }}/openssl-install/ssl" no-docs
        make -j$(nproc)
        make install_sw

    # ── Install OpenSSL (macOS) ── Homebrew ──
    - name: Install OpenSSL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install openssl@3

    # ── Install OpenSSL (Windows) ── vcpkg with cache ──
    - name: Cache vcpkg OpenSSL (Windows)
      if: runner.os == 'Windows'
      id: cache-openssl-windows
      uses: actions/cache@v4
      with:
        path: C:\vcpkg\installed
        key: openssl-vcpkg-windows-x64-${{ env.OPENSSL_VERSION }}

    - name: Install OpenSSL via vcpkg (Windows)
      if: runner.os == 'Windows' && steps.cache-openssl-windows.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        vcpkg install openssl:x64-windows

    # ── Configure CMake ──
    - name: Configure CMake
      shell: bash
      run: |
        cmake_args=(
          -B "${{ steps.strings.outputs.build-output-dir }}"
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DXYLEM_ENABLE_TESTING=ON
          -DXYLEM_ENABLE_TLS=ON
          -S "${{ github.workspace }}"
        )

        if [ "$RUNNER_OS" = "Linux" ]; then
          cmake_args+=(-DOPENSSL_ROOT_DIR="${{ github.workspace }}/openssl-install")
        elif [ "$RUNNER_OS" = "macOS" ]; then
          cmake_args+=(-DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)")
        elif [ "$RUNNER_OS" = "Windows" ]; then
          cmake_args+=(-DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake")
        fi

        cmake "${cmake_args[@]}"

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # ── Android (NDK cross-compile, build only) ──
  build-android:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (Android NDK)
      shell: bash
      run: |
        cmake \
          -B build \
          -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DXYLEM_ENABLE_TESTING=OFF \
          -DXYLEM_ENABLE_TLS=OFF \
          -S .

    - name: Build (Android)
      run: cmake --build build --config ${{ matrix.build_type }}

  # ── iOS (Xcode cross-compile, build only) ──
  build-ios:
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        sdk: [iphoneos, iphonesimulator]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (iOS)
      shell: bash
      run: |
        if [ "${{ matrix.sdk }}" = "iphonesimulator" ]; then
          arch="x86_64;arm64"
        else
          arch="arm64"
        fi

        cmake \
          -B build \
          -G Xcode \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_SYSROOT=${{ matrix.sdk }} \
          -DCMAKE_OSX_ARCHITECTURES="$arch" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
          -DXYLEM_ENABLE_TESTING=OFF \
          -DXYLEM_ENABLE_TLS=OFF \
          -S .

    - name: Build (iOS)
      run: cmake --build build --config ${{ matrix.build_type }}
